# Gradle daemon JVM heap.
# Compose + Hilt kapt is memory-intensive; 4GB minimum for stable builds.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

android.useAndroidX=true

# Jetifier disabled: Compose has zero Support Library dependencies.
# Enabling Jetifier adds 10-15 seconds to every clean build for zero benefit.
android.enableJetifier=false

kotlin.code.style=official

# R8 full mode: ~10-15% smaller APK.
# Requires comprehensive proguard-rules.pro (NewPipe, Jackson, Rhino, Hilt).
android.enableR8.fullMode=true

# Configuration cache: saves 2-5s on incremental builds by reusing the task graph.
org.gradle.configuration-cache=true

org.gradle.parallel=true
kotlin.incremental=true
kotlin.daemon.jvm.options=-Xmx2048m
